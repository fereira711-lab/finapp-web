<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>body{background:#0F172A;color:white;font-family:sans-serif;padding:20px;}</style>
</head>
<body>
  <h2>Debug Pluggy</h2>
  <div id="log"></div>
  <script>
    function log(msg) {
      document.getElementById('log').innerHTML += '<p>' + msg + '</p>';
    }
    log('Iniciando...');
    var token = new URLSearchParams(window.location.search).get('token');
    log('Token: ' + (token ? token.substring(0,20)+'...' : 'NAO ENCONTRADO'));
    var s = document.createElement('script');
    s.src = 'https://cdn.pluggy.ai/pluggy-connect/latest/pluggy-connect.js';
    s.onload = function() { log('Script OK! PluggyConnect: ' + typeof PluggyConnect); };
    s.onerror = function() { log('ERRO ao carregar script'); };
    document.head.appendChild(s);
  </script>
</body>
</html>
