<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>body{background:#0F172A;color:white;font-family:sans-serif;padding:20px;}</style>
</head>
<body>
  <h2>Debug Pluggy</h2>
  <div id="log"></div>
  <script>
    function log(msg) {
      var d = document.getElementById('log');
      d.innerHTML += '<p>' + new Date().toISOString().substr(11,8) + ' - ' + msg + '</p>';
    }
    log('Iniciando...');
    var s = document.createElement('script');
    s.src = 'https://cdn.pluggy.ai/pluggy-connect/latest/pluggy-connect.js';
    log('Carregando: ' + s.src);
    s.onload = function() { log('Script carregado! PluggyConnect: ' + typeof PluggyConnect); };
    s.onerror = function(e) { log('ERRO ao carregar script: ' + JSON.stringify(e.type)); };
    document.head.appendChild(s);
    setTimeout(function() { log('Timeout - PluggyConnect: ' + typeof window.PluggyConnect); }, 5000);
  </script>
</body>
</html>
